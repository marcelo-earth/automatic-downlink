project_name: "automatic-downlink-triage"
model_name: "LFM2.5-VL-450M"
training_type: "vlm_sft"

dataset:
  path: "training/data/train.jsonl"
  type: "vlm_sft"
  limit: null
  test_size: 0.1
  image_root: null  # images use absolute paths

training_config:
  extends: "DEFAULT_VLM_SFT"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  learning_rate: 2e-5
  vision_encoder_lr_multiplier: 0.1

peft_config:
  extends: "DEFAULT_VLM_LORA"
  use_peft: true
