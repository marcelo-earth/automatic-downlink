project_name: "automatic-downlink-triage"
model_name: "LFM2.5-VL-450M"
training_type: "vlm_sft"

dataset:
  path: "/satellite-vlm/data/train_modal.jsonl"
  type: "vlm_sft"
  limit: null
  test_size: 0.1
  image_root: null

training_config:
  extends: "DEFAULT_VLM_SFT"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  learning_rate: 2e-5
  vision_encoder_lr_multiplier: 0.1

peft_config:
  extends: "DEFAULT_VLM_LORA"
  use_peft: true

modal:
  app_name: "automatic-downlink"
  gpu: "H100:1"
  timeout: 14400  # 4 hours
  output_volume: "satellite-vlm"
  output_dir: "/satellite-vlm"
  detach: false
